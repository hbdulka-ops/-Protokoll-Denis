<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Denis Protokoll</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#3d5268">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>

    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #2d3748;
            --text-muted: #718096;
            --primary: #3d5268;
            --danger: #E8394A;
            --success: #4cba6b;
            --warning: #f1a13a;
            --border-color: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --radius: 12px;
        }

        [data-theme="dark"] {
            --bg-color: #1a202c;
            --card-bg: #2d3748;
            --text-color: #f7fafc;
            --text-muted: #a0aec0;
            --border-color: #4a5568;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'DM Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
            padding-bottom: 70px;
            overflow-x: hidden;
        }

        h1, h2, h3, .font-syne {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
        }

        /* PIN Lock Screen */
        #pin-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--primary);
            color: white;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease;
        }

        .pin-dots {
            display: flex;
            gap: 15px;
            margin: 30px 0;
        }

        .dot {
            width: 20px; height: 20px;
            border: 2px solid white;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .dot.active { background: white; animation: pop 0.2s ease; }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 75px);
            gap: 15px;
        }

        .key {
            width: 75px; height: 75px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: none; color: white;
            font-size: 24px; font-weight: bold;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .key:active { background: rgba(255,255,255,0.3); }

        .pin-error {
            color: #ff8a93;
            margin-top: 15px;
            font-weight: bold;
            min-height: 24px;
            animation: shake 0.3s ease;
            display: none;
        }

        /* Header UI */
        header {
            background: var(--primary);
            color: white;
            padding: 20px;
            border-bottom-left-radius: var(--radius);
            border-bottom-right-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            text-transform: uppercase;
        }
        .badge-normal { background: var(--success); color: white; }
        .badge-incident { background: var(--danger); color: white; }

        .progress-container {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            height: 8px;
            width: 100%;
            margin-top: 10px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: var(--success);
            width: 0%;
            transition: width 0.4s ease;
        }

        /* Grid Layout & Cards */
        .container {
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 15px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            transition: transform 0.2s, background-color 0.3s;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: bold;
        }

        input, select, textarea {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-color);
            font-size: 14px;
            width: 100%;
        }

        /* Protocol Rows */
        .protocol-row {
            border-left: 6px solid var(--success);
            margin-bottom: 15px;
            position: relative;
            animation: rowIn 0.3s ease-out;
        }
        .row-ok { border-left-color: var(--success); }
        .row-warning { border-left-color: var(--warning); }
        .row-danger { border-left-color: var(--danger); }

        .time-input-container {
            display: flex;
            gap: 5px;
        }
        .btn-now {
            background: var(--primary);
            color: white; border: none;
            padding: 0 10px; border-radius: 8px;
            cursor: pointer; font-size: 12px;
        }

        /* Notiz Entries */
        .notiz-box {
            background: rgba(0,0,0,0.03);
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
        }
        [data-theme="dark"] .notiz-box { background: rgba(255,255,255,0.03); }

        .counter-box {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
        }
        .btn-count {
            width: 30px; height: 30px;
            border-radius: 50%; border: none;
            background: var(--primary); color: white;
            font-weight: bold; cursor: pointer;
        }

        /* Photo Upload & Preview */
        .photo-wrapper {
            margin-top: 10px;
        }
        .thumb-preview {
            width: 60px; height: 60px;
            object-fit: cover;
            border-radius: 6px;
            margin-top: 5px;
            cursor: pointer;
            border: 1px solid var(--border-color);
        }

        /* Action Buttons */
        .btn-block {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: var(--radius);
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: var(--danger); color: white; }

        .export-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .btn-export {
            padding: 10px; border: none; border-radius: 8px;
            color: white; font-weight: bold; font-size: 12px; cursor: pointer;
            text-align: center;
        }

        /* Lower Autosave Bar */
        #autosave-bar {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: var(--card-bg);
            border-top: 1px solid var(--border-color);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            z-index: 900;
        }
        .status-indicator { display: flex; align-items: center; gap: 5px; }
        .dot-status { width: 8px; height: 8px; border-radius: 50%; }

        /* Toasts */
        #toast-container {
            position: fixed;
            top: 20px; right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            background: var(--card-bg);
            color: var(--text-color);
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--primary);
            font-size: 14px;
            font-weight: bold;
            animation: toastIn 0.3s ease forwards;
        }

        /* Modals */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            z-index: 2000;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: var(--card-bg);
            padding: 20px; width: 90%; max-width: 400px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        #image-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 10001;
            display: none; align-items: center; justify-content: center;
        }
        #image-overlay img { max-width: 95%; max-height: 85%; transform: scale(1); transition: transform 0.2s; }

        /* Color Coding for Hours */
        .time-tag { background: #e2e8f0; color: #1a202c; padding: 2px 6px; border-radius: 4px; font-size: 11px; width: max-content; margin-top: 2px;}
        .time-nacht { background: #2d3748; color: #fff; }
        .time-tag.time-tag-tag { background: #fef08a; color: #854d0e; }
        .time-abend { background: #fdba74; color: #7c2d12; }

        /* Animations */
        @keyframes rowIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body data-theme="light">

    <div id="pin-screen">
        <h2 class="font-syne">Denis Protokoll</h2>
        <p style="margin-top:5px; opacity:0.8;">Sicherheits-Login</p>
        <div class="pin-dots">
            <div class="dot" id="dot-0"></div>
            <div class="dot" id="dot-1"></div>
            <div class="dot" id="dot-2"></div>
            <div class="dot" id="dot-3"></div>
        </div>
        <div class="keypad">
            <button class="key" onclick="pressPin(1)">1</button>
            <button class="key" onclick="pressPin(2)">2</button>
            <button class="key" onclick="pressPin(3)">3</button>
            <button class="key" onclick="pressPin(4)">4</button>
            <button class="key" onclick="pressPin(5)">5</button>
            <button class="key" onclick="pressPin(6)">6</button>
            <button class="key" onclick="pressPin(7)">7</button>
            <button class="key" onclick="pressPin(8)">8</button>
            <button class="key" onclick="pressPin(9)">9</button>
            <button class="key" onclick="clearPin()">C</button>
            <button class="key" onclick="pressPin(0)">0</button>
            <button class="key" style="font-size:16px;" onclick="showToast('Info: Standard PIN ist 1234')">?</button>
        </div>
        <div class="pin-error" id="pin-error">Falscher PIN! Versuchen Sie es erneut.</div>
    </div>

    <header>
        <div class="header-top">
            <div>
                <h1 class="font-syne" style="font-size: 22px;">Denis Protokoll</h1>
                <div style="font-size:12px; opacity:0.9;" id="header-date-string">Mo, 01.01.2026</div>
            </div>
            <div id="status-badge" class="badge badge-normal" onclick="toggleStatusBadge()">Normal</div>
        </div>
        
        <div style="display:flex; gap:10px; font-size:13px; background:rgba(0,0,0,0.1); padding:8px; border-radius:6px;">
            <div>Nr: <span id="lbl-protokoll-nr" style="font-weight:bold;">--</span></div>
            <div>| Tag: <span id="lbl-schicht-tag" style="font-weight:bold;">--</span></div>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="shift-progress"></div>
        </div>
        <div style="display: flex; justify-content: space-between; font-size: 10px; margin-top: 4px; opacity: 0.8;">
            <span>Schichtfortschritt</span>
            <span id="progress-text">0%</span>
        </div>
    </header>

    <div class="container">
        <div class="card">
            <div class="meta-grid">
                <div class="form-group">
                    <label>Protokoll-Nr.</label>
                    <input type="text" id="meta-nr" oninput="updateMetaHeader()">
                </div>
                <div class="form-group">
                    <label>Schicht-Tag</label>
                    <select id="meta-tag" onchange="updateMetaHeader()">
                        <option value="Montag">Montag</option>
                        <option value="Dienstag">Dienstag</option>
                        <option value="Mittwoch">Mittwoch</option>
                        <option value="Donnerstag">Donnerstag</option>
                        <option value="Freitag">Freitag</option>
                        <option value="Samstag">Samstag</option>
                        <option value="Sonntag">Sonntag</option>
                    </select>
                </div>
            </div>
            <div class="meta-grid">
                <div class="form-group">
                    <label>Datum</label>
                    <input type="date" id="meta-datum" onchange="updateMetaHeader()">
                </div>
                <div class="form-group">
                    <label>Kunden-Metafeld</label>
                    <input type="text" id="meta-kunde" placeholder="z.B. Hauptwache">
                </div>
            </div>
        </div>

        <div id="protocol-rows-container"></div>

        <button class="btn-block btn-primary" onclick="addNewRow()">+ Zeile hinzufügen</button>

        <div class="card">
            <h3 style="margin-bottom:10px; font-size:16px;">Daten-Export</h3>
            <div class="export-grid">
                <button class="btn-export" style="background:#25D366;" onclick="exportWhatsApp()">WhatsApp</button>
                <button class="btn-export" style="background:#E8394A;" onclick="exportPDF()">PDF</button>
                <button class="btn-export" style="background:#3d5268;" onclick="copyToClipboard()">Kopieren</button>
            </div>
            <button class="btn-block" style="background:var(--border-color); color:var(--text-color);" onclick="openSettings()">⚙️ Einstellungen</button>
        </div>
    </div>

    <div id="autosave-bar">
        <div class="status-indicator">
            <div class="dot-status" id="save-dot" style="background:var(--success);"></div>
            <span id="save-text">Gespeichert</span>
        </div>
        <div style="opacity:0.7;">Denis Protokoll v1.0</div>
    </div>

    <div id="toast-container"></div>

    <div class="modal" id="settings-modal">
        <div class="modal-content">
            <h2 class="font-syne" style="margin-bottom: 15px;">Einstellungen</h2>
            <div class="form-group" style="margin-bottom:12px;">
                <label>Dark Mode</label>
                <select id="setting-darkmode" onchange="toggleDarkMode(this.value)">
                    <option value="light">Deaktiviert (Hell)</option>
                    <option value="dark">Aktiviert (Dunkel)</option>
                </select>
            </div>
            <div class="form-group" style="margin-bottom:12px;">
                <label>4-Stelligen PIN ändern</label>
                <input type="password" id="setting-pin" maxlength="4" placeholder="Neuen PIN eingeben">
            </div>
            <div class="form-group" style="margin-bottom:12px;">
                <label>Kundenliste (Kommagetrennt)</label>
                <textarea id="setting-kunden" rows="3"></textarea>
            </div>
            <div class="form-group" style="margin-bottom:15px;">
                <label>Schicht-Zeiten (Standard)</label>
                <div style="display:flex; gap:5px;">
                    <input type="time" id="setting-start" value="18:00">
                    <input type="time" id="setting-ende" value="06:00">
                </div>
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn-block btn-primary" style="margin:0;" onclick="saveSettings()">Speichern</button>
                <button class="btn-block" style="margin:0; background:var(--border-color); color:black;" onclick="closeSettings()">Schließen</button>
            </div>
        </div>
    </div>

    <div id="image-overlay" onclick="this.style.display='none'">
        <img id="overlay-img" src="" alt="Vorschau">
    </div>

    <script>
        // Global State & Data persistence 
        let currentPinInput = "";
        let correctPin = "1234";
        let kundenListe = ["Objekt A", "Objekt B", "Parkplatz Nord", "Haupteingang"];
        let appSettings = {
            theme: 'light',
            pin: '1234',
            kunden: "Objekt A, Objekt B, Parkplatz Nord, Haupteingang",
            schichtStart: "18:00",
            schichtEnde: "06:00"
        };
        
        let sessionData = {
            meta: { nr: "101", tag: "Montag", datum: "2026-05-31", kundeMeta: "", status: "Normal" },
            rows: []
        };

        window.addEventListener('DOMContentLoaded', () => {
            initApp();
            generateDynamicIcons();
        });

        function initApp() {
            // Load Settings
            if(localStorage.getItem('denis_settings')) {
                appSettings = JSON.parse(localStorage.getItem('denis_settings'));
                correctPin = appSettings.pin;
                kundenListe = appSettings.kunden.split(',').map(s => s.trim());
                document.getElementById('setting-darkmode').value = appSettings.theme;
                toggleDarkMode(appSettings.theme);
                document.getElementById('setting-pin').value = appSettings.pin;
                document.getElementById('setting-kunden').value = appSettings.kunden;
                document.getElementById('setting-start').value = appSettings.schichtStart;
                document.getElementById('setting-ende').value = appSettings.schichtEnde;
            }

            // Load Session Data
            if(localStorage.getItem('denis_session_data')) {
                sessionData = JSON.parse(localStorage.getItem('denis_session_data'));
                // Set UI Meta Values
                document.getElementById('meta-nr').value = sessionData.meta.nr;
                document.getElementById('meta-tag').value = sessionData.meta.tag;
                document.getElementById('meta-datum').value = sessionData.meta.datum;
                document.getElementById('meta-kunde').value = sessionData.meta.kundeMeta || "";
                if(sessionData.meta.status === "Vorfall") {
                    const b = document.getElementById('status-badge');
                    b.className = "badge badge-incident";
                    b.innerText = "Vorfall";
                }
                updateMetaHeader();
                
                // Redraw Rows
                sessionData.rows.forEach(rowData => renderRowHTML(rowData));
            } else {
                // Set default dates
                const today = new Date();
                const days = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
                document.getElementById('meta-datum').value = today.toISOString().split('T')[0];
                document.getElementById('meta-tag').value = days[today.getDay()];
                document.getElementById('meta-nr').value = Math.floor(Math.random() * 900) + 100;
                updateMetaHeader();
                addNewRow();
            }
            calculateProgress();
        }

        // Custom PIN Lock Logic
        function pressPin(num) {
            if(currentPinInput.length < 4) {
                currentPinInput += num;
                document.getElementById(`dot-${currentPinInput.length - 1}`).classList.add('active');
            }
            if(currentPinInput.length === 4) {
                setTimeout(() => {
                    if(currentPinInput === correctPin) {
                        document.getElementById('pin-screen').style.opacity = 0;
                        setTimeout(() => document.getElementById('pin-screen').style.display = 'none', 400);
                        showToast('Erfolgreich eingeloggt');
                    } else {
                        document.getElementById('pin-error').style.display = 'block';
                        clearPin();
                    }
                }, 150);
            }
        }

        function clearPin() {
            currentPinInput = "";
            for(let i=0; i<4; i++) document.getElementById(`dot-${i}`).classList.remove('active');
        }

        // UI Header sync
        function updateMetaHeader() {
            const nr = document.getElementById('meta-nr').value;
            const tag = document.getElementById('meta-tag').value;
            const datum = document.getElementById('meta-datum').value;

            document.getElementById('lbl-protokoll-nr').innerText = nr;
            document.getElementById('lbl-schicht-tag').innerText = tag;
            
            if(datum) {
                const d = new Date(datum);
                document.getElementById('header-date-string').innerText = d.toLocaleDateString('de-DE', { weekday: 'short', day: '2-digit', month: '2-digit', year: 'numeric' });
            }
            saveTrigger();
        }

        function toggleStatusBadge() {
            const b = document.getElementById('status-badge');
            if(b.innerText === "NORMAL") {
                b.className = "badge badge-incident";
                b.innerText = "Vorfall";
            } else {
                b.className = "badge badge-normal";
                b.innerText = "Normal";
            }
            saveTrigger();
        }

        // Dynamic Rows creation
        function addNewRow() {
            const rowId = 'row_' + Date.now();
            const rowData = {
                id: rowId, statusColor: 'ok', kunde: '', kundeFreitext: '',
                beginn: '', ende: '', count: 0, notizDropdown: '', notizFreitext: '', photo: ''
            };
            sessionData.rows.push(rowData);
            renderRowHTML(rowData);
            saveTrigger();
        }

        function renderRowHTML(rowData) {
            const container = document.getElementById('protocol-rows-container');
            
            let clientOptions = kundenListe.map(k => `<option value="${k}" ${rowData.kunde === k ? 'selected':''}>${k}</option>`).join('');
            
            const html = `
                <div class="card protocol-row row-${rowData.statusColor}" id="${rowData.id}">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <select style="width:45%; font-weight:bold;" onchange="updateRowData('${rowData.id}', 'statusColor', this.value); updateRowColorStyle('${rowData.id}', this.value)">
                            <option value="ok" ${rowData.statusColor === 'ok'?'selected':''}>🟢 Status: OK</option>
                            <option value="warning" ${rowData.statusColor === 'warning'?'selected':''}>🟠 Status: Warnung</option>
                            <option value="danger" ${rowData.statusColor === 'danger'?'selected':''}>🔴 Status: Gefahr</option>
                        </select>
                        <button class="btn-now" style="background:var(--danger); padding:4px 10px;" onclick="deleteRow('${rowData.id}')">Löschen</button>
                    </div>

                    <div class="meta-grid">
                        <div class="form-group">
                            <label>Kunde</label>
                            <select onchange="updateRowData('${rowData.id}', 'kunde', this.value)">
                                <option value="">-- Wählen --</option>
                                ${clientOptions}
                                <option value="FREITEXT" ${rowData.kunde === 'FREITEXT'?'selected':''}>[Freitext eingeben]</option>
                            </select>
                            <input type="text" placeholder="Freitext Name" value="${rowData.kundeFreitext || ''}" 
                                   oninput="updateRowData('${rowData.id}', 'kundeFreitext', this.value)" 
                                   style="margin-top:5px; display:${rowData.kunde==='FREITEXT'?'block':'none'};" class="freitext-kunde-input">
                        </div>
                        <div class="form-group">
                            <label>Beginn (Uhrzeit)</label>
                            <div class="time-input-container">
                                <input type="time" value="${rowData.beginn || ''}" onchange="updateRowTime('${rowData.id}', 'beginn', this.value)">
                                <button class="btn-now" onclick="setTimeNow('${rowData.id}', 'beginn')">Jetzt</button>
                            </div>
                            <div class="time-tag" id="tag-${rowData.id}">${getTimeColorLabel(rowData.beginn)}</div>
                        </div>
                    </div>

                    <div class="meta-grid">
                        <div class="form-group">
                            <label>Ende (Uhrzeit)</label>
                            <div class="time-input-container">
                                <input type="time" value="${rowData.ende || ''}" onchange="updateRowTime('${rowData.id}', 'ende', this.value)">
                                <button class="btn-now" onclick="setTimeNow('${rowData.id}', 'ende')">Jetzt</button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Zähler / Anzahl</label>
                            <div class="counter-box">
                                <button class="btn-count" onclick="stepCounter('${rowData.id}', -1)">-</button>
                                <span style="font-weight:bold; min-width:20px; text-align:center;" id="count-${rowData.id}">${rowData.count || 0}</span>
                                <button class="btn-count" onclick="stepCounter('${rowData.id}', 1)">+</button>
                            </div>
                        </div>
                    </div>

                    <div class="notiz-box">
                        <label>Vorfälle & Notizen</label>
                        <select onchange="updateRowData('${rowData.id}', 'notizDropdown', this.value)" style="margin-bottom:5px;">
                            <option value="">-- Standard-Notiz wählen --</option>
                            <option value="Kontrollgang ohne Vorkommnisse" ${rowData.notizDropdown==='Kontrollgang ohne Vorkommnisse'?'selected':''}>Kontrollgang ohne Vorkommnisse</option>
                            <option value="Objekt verschlossen vorgefunden" ${rowData.notizDropdown==='Objekt verschlossen vorgefunden'?'selected':''}>Objekt verschlossen vorgefunden</option>
                            <option value="Unbefugte Personen verwiesen" ${rowData.notizDropdown==='Unbefugte Personen verwiesen'?'selected':''}>Unbefugte Personen verwiesen</option>
                            <option value="Technischer Defekt gemeldet" ${rowData.notizDropdown==='Technischer Defekt gemeldet'?'selected':''}>Technischer Defekt gemeldet</option>
                        </select>
                        <textarea placeholder="Zusätzlicher Freitext-Eintrag..." rows="2" oninput="updateRowData('${rowData.id}', 'notizFreitext', this.value)">${rowData.notizFreitext || ''}</textarea>
                        
                        <div class="photo-wrapper">
                            <label style="cursor:pointer; color:var(--primary);">📷 Foto hochladen
                                <input type="file" accept="image/*" style="display:none;" onchange="handlePhotoUpload('${rowData.id}', this)">
                            </label>
                            <div id="photo-preview-${rowData.id}">
                                ${rowData.photo ? `<img src="${rowData.photo}" class="thumb-preview" onclick="openImageViewer('${rowData.photo}')">` : ''}
                            </div>
                        </div>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
        }

        function updateRowData(rowId, field, val) {
            const index = sessionData.rows.findIndex(r => r.id === rowId);
            if(index !== -1) {
                sessionData.rows[index][field] = val;
                
                // Show/hide custom text field for customer
                if(field === 'kunde') {
                    const rowEl = document.getElementById(rowId);
                    const fInput = rowEl.querySelector('.freitext-kunde-input');
                    fInput.style.display = (val === 'FREITEXT') ? 'block' : 'none';
                }
                saveTrigger();
            }
        }

        function updateRowColorStyle(rowId, status) {
            const el = document.getElementById(rowId);
            el.className = `card protocol-row row-${status}`;
        }

        function setTimeNow(rowId, field) {
            const now = new Date();
            const timeStr = now.toTimeString().split(' ')[0].substring(0, 5);
            const rowEl = document.getElementById(rowId);
            const input = rowEl.querySelector(`input[type="time"][value], input[type="time"]`);
            
            // Loop inputs to match target
            const inputs = rowEl.querySelectorAll('input[type="time"]');
            if(field === 'beginn') {
                inputs[0].value = timeStr;
                updateRowTime(rowId, 'beginn', timeStr);
            } else {
                inputs[1].value = timeStr;
                updateRowTime(rowId, 'ende', timeStr);
            }
        }

        function updateRowTime(rowId, field, val) {
            updateRowData(rowId, field, val);
            if(field === 'beginn') {
                const tagEl = document.getElementById(`tag-${rowId}`);
                tagEl.className = `time-tag ${getTimeColorClass(val)}`;
                tagEl.innerText = getTimeColorLabel(val);
            }
            calculateProgress();
        }

        function stepCounter(rowId, amount) {
            const index = sessionData.rows.findIndex(r => r.id === rowId);
            if(index !== -1) {
                let current = sessionData.rows[index].count || 0;
                current += amount;
                if(current < 0) current = 0;
                sessionData.rows[index].count = current;
                document.getElementById(`count-${rowId}`).innerText = current;
                saveTrigger();
            }
        }

        function handlePhotoUpload(rowId, input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64Data = e.target.result;
                    updateRowData(rowId, 'photo', base64Data);
                    const previewDiv = document.getElementById(`photo-preview-${rowId}`);
                    previewDiv.innerHTML = `<img src="${base64Data}" class="thumb-preview" onclick="openImageViewer('${base64Data}')">`;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function openImageViewer(src) {
            const overlay = document.getElementById('image-overlay');
            const img = document.getElementById('overlay-img');
            img.src = src;
            overlay.style.display = 'flex';
        }

        function deleteRow(rowId) {
            if(confirm('Möchten Sie diese Zeile wirklich löschen?')) {
                document.getElementById(rowId).remove();
                sessionData.rows = sessionData.rows.filter(r => r.id !== rowId);
                saveTrigger();
                calculateProgress();
            }
        }

        // Time calculations for coloring labels
        function getTimeColorClass(timeStr) {
            if(!timeStr) return '';
            const hour = parseInt(timeStr.split(':')[0]);
            if (hour >= 6 && hour < 18) return 'time-tag-tag';
            if (hour >= 18 && hour < 22) return 'time-abend';
            return 'time-nacht';
        }

        function getTimeColorLabel(timeStr) {
            if(!timeStr) return 'Keine Zeit';
            const hour = parseInt(timeStr.split(':')[0]);
            if (hour >= 6 && hour < 18) return '☀️ Tagdienst';
            if (hour >= 18 && hour < 22) return '🌆 Abenddienst';
            return '🌙 Nachtdienst';
        }

        // Calculation of working shift percentage progress
        function calculateProgress() {
            if(sessionData.rows.length === 0) {
                setProgressBar(0);
                return;
            }
            
            // Basic estimation based on hours typed or standard shift times
            let filledFields = 0;
            let totalFields = sessionData.rows.length * 2;
            
            sessionData.rows.forEach(r => {
                if(r.beginn) filledFields++;
                if(r.ende) filledFields++;
            });

            let pct = Math.round((filledFields / totalFields) * 100);
            setProgressBar(pct);
        }

        function setProgressBar(pct) {
            document.getElementById('shift-progress').style.width = pct + '%';
            document.getElementById('progress-text').innerText = pct + '%';
        }

        // Autosave Infrastructure
        let saveTimeout;
        function saveTrigger() {
            document.getElementById('save-dot').style.background = 'var(--warning)';
            document.getElementById('save-text').innerText = 'Wird gespeichert...';
            
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                try {
                    // Gather Meta
                    sessionData.meta.nr = document.getElementById('meta-nr').value;
                    sessionData.meta.tag = document.getElementById('meta-tag').value;
                    sessionData.meta.datum = document.getElementById('meta-datum').value;
                    sessionData.meta.kundeMeta = document.getElementById('meta-kunde').value;
                    sessionData.meta.status = document.getElementById('status-badge').innerText;

                    localStorage.setItem('denis_session_data', JSON.stringify(sessionData));
                    
                    document.getElementById('save-dot').style.background = 'var(--success)';
                    document.getElementById('save-text').innerText = 'Gespeichert';
                } catch(e) {
                    document.getElementById('save-dot').style.background = 'var(--danger)';
                    document.getElementById('save-text').innerText = 'Fehler beim Speichern';
                }
            }, 1000);
        }

        // Settings Handling
        function openSettings() { document.getElementById('settings-modal').classList.add('active'); }
        function closeSettings() { document.getElementById('settings-modal').classList.remove('active'); }
        
        function saveSettings() {
            appSettings.theme = document.getElementById('setting-darkmode').value;
            if(document.getElementById('setting-pin').value.length === 4) {
                appSettings.pin = document.getElementById('setting-pin').value;
                correctPin = appSettings.pin;
            }
            appSettings.kunden = document.getElementById('setting-kunden').value;
            appSettings.schichtStart = document.getElementById('setting-start').value;
            appSettings.schichtEnde = document.getElementById('setting-ende').value;

            localStorage.setItem('denis_settings', JSON.stringify(appSettings));
            kundenListe = appSettings.kunden.split(',').map(s => s.trim());
            
            showToast('Einstellungen erfolgreich gespeichert!');
            closeSettings();
        }

        function toggleDarkMode(mode) {
            document.body.setAttribute('data-theme', mode);
        }

        // Toasts
        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Export Functionality Assemblies
        function buildSummaryText() {
            let m = sessionData.meta;
            let txt = `📝 *Denis Protokoll - Schichtbericht*\n`;
            txt += `• Protokoll-Nr: ${m.nr}\n• Tag: ${m.tag} (${m.datum})\n• Bereich: ${m.kundeMeta || 'N/A'}\n• Status: ${m.status}\n`;
            txt += `=========================\n`;
            
            sessionData.rows.forEach((r, i) => {
                let kName = r.kunde === 'FREITEXT' ? r.kundeFreitext : r.kunde;
                txt += `\n*Eintrag #${i+1}* [Status: ${r.statusColor.toUpperCase()}]\n`;
                txt += `🏢 Kunde: ${kName || 'Keiner'}\n`;
                txt += `⏱ Zeit: ${r.beginn || '--:--'} bis ${r.ende || '--:--'}\n`;
                if(r.count > 0) txt += `🔢 Anzahl/Zähler: ${r.count}\n`;
                if(r.notizDropdown || r.notizFreitext) {
                    txt += `💬 Notiz: ${r.notizDropdown} ${r.notizFreitext}\n`;
                }
            });
            return txt;
        }

        function exportWhatsApp() {
            let txt = encodeURIComponent(buildSummaryText());
            window.open(`https://api.whatsapp.com/send?text=${txt}`, '_blank');
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(buildSummaryText()).then(() => {
                showToast('In Zwischenablage kopiert!');
            });
        }

        function exportPDF() {
            showToast('Generiere PDF...');
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            let m = sessionData.meta;

            doc.setFont("Helvetica", "bold");
            doc.setFontSize(20);
            doc.text("Denis Protokoll - Schichtbericht", 15, 20);
            
            doc.setFontSize(11);
            doc.setFont("Helvetica", "normal");
            doc.text(`Protokoll-Nummer: ${m.nr}`, 15, 30);
            doc.text(`Schicht-Tag: ${m.tag} (${m.datum})`, 15, 36);
            doc.text(`Zusatzfeld: ${m.kundeMeta || 'Keine Angabe'}`, 15, 42);
            doc.text(`Gesamt-Status: ${m.status}`, 15, 48);
            doc.line(15, 52, 195, 52);

            let y = 60;
            sessionData.rows.forEach((r, i) => {
                if(y > 260) { doc.addPage(); y = 20; }
                let kName = r.kunde === 'FREITEXT' ? r.kundeFreitext : r.kunde;
                
                doc.setFont("Helvetica", "bold");
                doc.text(`Eintrag #${i+1} - Status: ${r.statusColor.toUpperCase()}`, 15, y);
                y += 6;
                doc.setFont("Helvetica", "normal");
                doc.text(`Kunde/Objekt: ${kName || 'Keiner'}`, 20, y);
                y += 6;
                doc.text(`Zeitintervall: ${r.beginn || '--:--'} - ${r.ende || '--:--'} | Anzahl: ${r.count}`, 20, y);
                y += 6;
                doc.text(`Eintragungen: ${r.notizDropdown} ${r.notizFreitext}`, 20, y);
                y += 10;
            });

            doc.save(`Denis_Protokoll_Nr_${m.nr}.pdf`);
            showToast('PDF erfolgreich heruntergeladen!');
        }

        // Dynamic Canvas Built-in Base64 Icon Generation for PWA
        function generateDynamicIcons() {
            const canvas = document.createElement('canvas');
            canvas.width = 180; canvas.height = 180;
            const ctx = canvas.getContext('2d');
            
            // Round Rect style matching requirements
            ctx.fillStyle = '#3d5268';
            ctx.beginPath();
            ctx.roundRect(0, 0, 180, 180, 30);
            ctx.fill();
            
            // Custom Letter "D" Graphic inside Canvas
            ctx.fillStyle = '#4cba6b';
            ctx.font = 'bold 90px Syne, Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('D', 90, 90);
            
            const base64Png = canvas.toDataURL('image/png');
            
            // Injection dynamically into standard document headers
            let iconLink = document.createElement('link');
            iconLink.rel = 'apple-touch-icon'; iconLink.href = base64Png;
            document.head.appendChild(iconLink);
            
            let faviconLink = document.createElement('link');
            faviconLink.rel = 'icon'; faviconLink.type = 'image/png'; faviconLink.href = base64Png;
            document.head.appendChild(faviconLink);
        }
    </script>
</body>
</html>
